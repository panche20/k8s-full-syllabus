apiVersion: v1
kind: Pod
metadata:
  name: url-shortener
  labels:
    app: url-shortener
spec:
  initContainers:
  - name: wait-for-redis
    image: busybox:1.35
    command: ['sh','-c','until nc -z localhost 6379; do sleep 1; done']

  containers:
  - name: fastapi
    image: python:3.11-slim
    command: ["python","-m","http.server","8000"]  # stand-in for your app
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    livenessProbe:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 3
      periodSeconds: 5